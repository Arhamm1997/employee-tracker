appId: com.stafftrack.agent
productName: StaffTrack Agent
directories:
  output: dist-exe
files:
  - dist/**
  - package.json
win:
  target: nsis
  icon: assets/icon.ico
  requestedExecutionLevel: requireAdministrator
nsis:
  oneClick: true
  perMachine: true
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: false
  createStartMenuShortcut: false
  runAfterFinish: true

