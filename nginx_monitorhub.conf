# ── Backend API (api.monitorhub.live) ─────────────────────────
server {
    listen 443 ssl http2;
    server_name api.monitorhub.live;
    client_max_body_size 200M;
    ssl_certificate /etc/letsencrypt/live/monitorhub.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/monitorhub.live/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }
}

# ── Master Admin Dashboard (admin.monitorhub.live) ────────────
server {
    listen 443 ssl http2;
    server_name admin.monitorhub.live;
    ssl_certificate /etc/letsencrypt/live/monitorhub.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/monitorhub.live/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    root "/root/employee-tracker/Master Admin Dashboard/dist";
    index index.html;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
