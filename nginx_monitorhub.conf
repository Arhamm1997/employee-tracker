# ── Redirect HTTP → HTTPS ─────────────────────────────────────
server {
    listen 80;
    server_name monitorhub.live www.monitorhub.live app.monitorhub.live api.monitorhub.live admin.monitorhub.live;
    return 301 https://$server_name$request_uri;
}

# ── Main site (monitorhub.live) ───────────────────────────────
server {
    listen 443 ssl http2;
    server_name monitorhub.live www.monitorhub.live;
    ssl_certificate /etc/letsencrypt/live/monitorhub.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/monitorhub.live/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Landing page at root
    location = / {
        root /var/www/landing;
        try_files /index.html =404;
    }

    # Company Portal (Next.js) - plan selection after signup
    # ^~ prevents regex locations from taking priority
    location ^~ /select-plan {
        proxy_pass http://127.0.0.1:5172;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location ^~ /dashboard-ready {
        proxy_pass http://127.0.0.1:5172;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location ^~ /payment/ {
        proxy_pass http://127.0.0.1:5172;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Next.js static assets — ^~ prevents regex from intercepting .js/.css files
    location ^~ /_next/ {
        proxy_pass http://127.0.0.1:5172;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy API calls to backend
    location /api/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 20M;
    }

    # Proxy WebSocket
    location /ws {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy uploads (screenshots and other files)
    location /uploads/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # React app static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /root/employee-tracker/Frontend/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # React app (all other paths — login, signup, dashboard, etc.)
    location / {
        root /root/employee-tracker/Frontend/dist;
        try_files $uri $uri/ /index.html;
    }
}

